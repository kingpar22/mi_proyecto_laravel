<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>ZaguNet Dashboard</title>
        <link rel="stylesheet" href="css/dashboarad.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <script>
            // obtener token
            const token = localStorage.getItem("token");

            // proteger página
            if (!token) {
                window.location.href = "login.html";
            }

            // obtener usuario autenticado
            fetch("http://127.0.0.1:8000/api/perfil", {
                method: "GET",
                headers: {
                    Authorization: "Bearer " + token,
                    "Content-Type": "application/json",
                },
            })
                .then((response) => response.json())
                .then((data) => {
                    document.getElementById("usuarioNombre").textContent =
                        data.usuario.name;
                    document.getElementById("topUser").textContent =
                        data.usuario.name;
                })
                .catch((error) => console.log(error));

            // obtener datos del dashboard
            fetch("http://127.0.0.1:8000/api/dashboard", {
                method: "GET",
                headers: {
                    Authorization: "Bearer " + token,
                    "Content-Type": "application/json",
                },
            })
                .then((response) => response.json())
                .then((data) => {
                    document.getElementById("totalClientes").textContent =
                        data.clientes;
                })
                .catch((error) => console.log(error));

            // logout
            document.querySelector(".logout").addEventListener("click", () => {
                localStorage.removeItem("token");

                window.location.href = "login.html";
            });
        </script>

        <div class="container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="logo">ZaguNet</div>

                <div class="user-role">Cargando...</div>

                <nav>
                    <ul>
                        <li class="active">Dashboard</li>
                        <li class="active">
                            <a href="../views/Lista_cliente.html">Clientes</a>
                        </li>
                        <li>Finanzas</li>
                        <li>Sistema</li>
                        <li>Fichas HotSport</li>
                    </ul>
                </nav>

                <div class="logout">Cerrar sesión</div>
            </aside>

            <!-- Main Content -->
            <main class="main">
                <!-- Top Bar -->
                <header class="topbar">
                    <h2>Dashboard</h2>
                    <div class="top-actions">
                        <span>Ayuda</span>
                        <span>🔔</span>
                        <span id="topUser">...</span>
                    </div>
                </header>

                <!-- Cards Row -->
                <section class="cards">
                    <div class="card">
                        <h4>Pagos Internet</h4>
                        <div class="big-number">$2,800.00</div>
                        <small>Pendiente - 37 pagos</small>
                    </div>

                    <div class="card">
                        <h4>Clientes</h4>
                        <div class="big-number" id="totalClientes">0</div>
                        <small>Total</small>
                    </div>

                    <div class="card">
                        <h4>Tickets</h4>
                        <div class="big-number">0</div>
                        <small>Pendientes</small>
                    </div>
                </section>

                <!-- Traffic Boxes -->
                <section class="traffic">
                    <div class="traffic-box">
                        <h4>Tráfico</h4>
                        <div>0 GiB</div>
                        <small>Total Descarga</small>
                    </div>

                    <div class="traffic-box">
                        <h4>&nbsp;</h4>
                        <div>0 GiB</div>
                        <small>Total Subida</small>
                    </div>
                </section>

                <!-- Chart Section -->
                <section class="chart-section">
                    <h4>Historial de Finanzas</h4>

                    <div class="chart">
                        <div class="bar" style="height: 60%"></div>
                        <div class="bar" style="height: 50%"></div>
                        <div class="bar" style="height: 65%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 88%"></div>
                        <div class="bar" style="height: 95%"></div>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
